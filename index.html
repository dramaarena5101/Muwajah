<!doctype html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <title>Muwajjah Tracker Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- jQuery dan Select2 -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="Muwajjah Tracker Pro" />
  <meta property="og:description" content="Sistem Pantauan Pembelajaran Santri Modern" />
  <meta property="og:image" content="https://safe-ness.github.io/muwajjahtracker/icons/icon-192.png" />
  <meta property="og:url" content="https://safe-ness.github.io/muwajjahtracker" />
  <meta property="og:type" content="website" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ea580c">

  <style>
    :root {
      --primary: #ea580c;
      /* Modern Orange */
      --primary-hover: #c2410c;
      --bg-color: #f1f5f9;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --accent: #14b8a6;
      /* Teal Accent */
    }

    body {
      background-color: var(--bg-color);
      font-family: "Inter", sans-serif;
      color: var(--text-main);
      padding-bottom: 90px;
      /* Space for sticky bottom button */
      -webkit-font-smoothing: antialiased;
    }

    /* Typography */
    h2 {
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--primary);
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    /* Cards */
    .card {
      border: none;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
      border-radius: 20px;
      margin-bottom: 24px;
      background: var(--card-bg);
      overflow: hidden;
    }

    .card-body {
      padding: 24px;
    }

    /* Forms */
    .form-label {
      font-weight: 500;
      font-size: 14px;
      color: var(--text-main);
    }

    .form-control,
    .form-select {
      border-radius: 12px;
      border: 1px solid var(--border-color);
      padding: 12px 16px;
      font-size: 15px;
      background-color: #f8fafc;
      transition: all 0.2s ease;
    }

    .form-control:focus,
    .form-select:focus {
      background-color: #fff;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.1);
    }

    .input-group-text {
      border-radius: 12px 0 0 12px;
      border: 1px solid var(--border-color);
      background: #f8fafc;
    }

    /* Select2 Customization */
    .select2-container--default .select2-selection--single {
      height: 48px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background-color: #f8fafc;
      display: flex;
      align-items: center;
    }

    .select2-container--default .select2-selection--single .select2-selection__arrow {
      height: 46px;
    }

    /* Buttons */
    .btn {
      border-radius: 12px;
      padding: 12px 20px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-primary {
      background-color: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      border-color: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(234, 88, 12, 0.2);
    }

    .btn-primary:disabled {
      background-color: #94a3b8;
      border-color: #94a3b8;
      transform: none;
      box-shadow: none;
    }

    .btn-scan {
      background: linear-gradient(135deg, var(--primary) 0%, #c2410c 100%);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 14px;
      box-shadow: 0 4px 12px rgba(234, 88, 12, 0.3);
    }

    .btn-scan:hover {
      color: white;
      transform: scale(1.02);
    }

    /* Table */
    .table-container {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      border-radius: 16px;
    }

    .table-container::-webkit-scrollbar {
      width: 6px;
    }

    .table-container::-webkit-scrollbar-thumb {
      background-color: #cbd5e1;
      border-radius: 10px;
    }

    #tabelMateri {
      margin-bottom: 0;
    }

    #tabelMateri thead th {
      background: rgba(241, 245, 249, 0.95);
      backdrop-filter: blur(4px);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      border-bottom: 2px solid var(--border-color);
      padding: 16px;
    }

    #tabelMateri td {
      padding: 16px;
      vertical-align: middle;
      border-bottom: 1px solid #f1f5f9;
    }

    #tabelMateri tr:last-child td {
      border-bottom: none;
    }

    #tabelMateri tr.reported {
      background: #f8fafc;
      color: #94a3b8;
    }

    #tabelMateri tr.reported td:last-child {
      color: var(--primary);
      font-size: 20px;
    }

    .table-secondary {
      background-color: #e2e8f0 !important;
    }

    .table-secondary td {
      color: var(--text-main) !important;
      font-size: 15px;
    }

    /* Custom Checkbox */
    input[type="checkbox"] {
      width: 24px;
      height: 24px;
      accent-color: var(--primary);
      cursor: pointer;
      border-radius: 6px;
      transition: transform 0.2s;
    }

    input[type="checkbox"]:active {
      transform: scale(0.9);
    }

    /* RTL Arabic */
    .rtl {
      direction: rtl;
      text-align: right;
      font-family: "Amiri", "Scheherazade New", "Traditional Arabic", serif;
      font-size: 1.25rem;
      line-height: 1.6;
    }

    .ltr {
      direction: ltr;
      text-align: left;
    }

    /* Progress List */
    #progress .list-group-item {
      border: none;
      margin-bottom: 8px;
      border-radius: 12px;
      background: #f8fafc;
      padding: 16px;
      transition: transform 0.2s;
    }

    #progress .list-group-item:hover {
      transform: translateX(4px);
      background: #f1f5f9;
    }

    .badge-jenis {
      background: #e0f2fe;
      color: #0369a1;
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 12px;
    }

    /* Floating Save Button Mobile */
    .floating-bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 16px 20px;
      border-top: 1px solid var(--border-color);
      z-index: 1000;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
    }



    /* Offline Banner */
    .offline-banner {
      background: #ef4444;
      color: white;
      text-align: center;
      padding: 8px;
      font-size: 14px;
      font-weight: 500;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 10000;
      display: none;
    }
  </style>
</head>

<body>
  <!-- Offline Banner -->
  <div id="offlineBanner" class="offline-banner">
    ⚠️ Anda sedang offline. Beberapa fitur mungkin tidak berfungsi.
  </div>



  <div class="container py-4">
    <div class="text-center mb-5">
      <h2 class="fw-bolder">Muwajjah Tracker</h2>
      <p class="text-muted">Sistem Pantauan Pembelajaran Santri Terpadu</p>
    </div>

    <!-- Form Data Santri -->
    <div class="card">
      <div class="card-body">
        <div class="section-title">Identitas Santri</div>
        <form id="formSantri" class="row g-4" onsubmit="return false;">

          <div class="col-md-6">
            <label class="form-label d-flex justify-content-between align-items-center">
              <span>Nomor Stambuk</span>
              <button id="btnScanQR" class="btn-scan d-flex align-items-center gap-2" type="button"
                data-bs-toggle="modal" data-bs-target="#modalScanQR">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z">
                  </path>
                </svg>
                Scan QR
              </button>
            </label>
            <input type="text" readonly id="stambuk" class="form-control" placeholder="Arahkan kamera ke ID Card..."
              required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" readonly id="nama" class="form-control" placeholder="-" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Kelas</label>
            <input type="text" readonly id="kelas" class="form-control" placeholder="-" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Daerah/Asrama</label>
            <input type="text" readonly id="daerah" class="form-control" placeholder="-" required>
          </div>
        </form>
      </div>
    </div>

    <!-- Form Parameter Setoran -->
    <div class="card">
      <div class="card-body">
        <div class="section-title">Parameter Setoran</div>
        <div class="row g-4">
          <div class="col-md-12">
            <label for="pembimbing" class="form-label">Ustadz Pembimbing (Penyimak)</label>
            <select id="pembimbing" class="form-select" style="width:100%;">
              <option value="">Memuat data...</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Jenis Kegiatan</label>
            <select id="jenis" class="form-select" required>
              <option value="">-- Pilih Jenis Kegiatan --</option>
              <option value="Menghafal">📖 Menghafal (Tahfizh)</option>
              <option value="Merangkum">✍️ Merangkum (Takhlish)</option>
              <option value="Menggaris">🖊️ Menggaris bawahi (Tasthir)</option>
              <option value="Menanyakan">❓ Meminta penjelasan (Bayan)</option>
              <option value="Latihan">📝 Latihan soal (Tatbiq)</option>
              <option value="Mengajar">👨‍🏫 Mengajar orang lain (Ta’lim)</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Mata Pelajaran</label>
            <select id="pelajaran" class="form-select" required></select>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabel Materi -->
    <div class="card mb-5 pb-4" id="materiCard" style="display: none;">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="section-title mb-0">Daftar Materi</div>
          <div style="width: 200px;">
            <input type="text" id="searchJudul" class="form-control form-control-sm rounded-pill px-3"
              placeholder="🔍 Cari judul...">
          </div>
        </div>

        <div class="table-container">
          <table id="tabelMateri" class="table align-middle mb-0">
            <thead>
              <tr>
                <th scope="col" style="width: 60px;">No</th>
                <th scope="col">Judul Materi / Bab</th>
                <th scope="col" style="width: 80px;" class="text-center">Status</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Progress History -->
    <div id="progress" class="mt-4"></div>
  </div>

  <!-- Floating Save Button -->
  <div class="floating-bottom d-flex justify-content-between align-items-center">
    <div class="text-muted small fw-medium" id="statusSelection">Belum ada materi dipilih</div>
    <button id="btnSimpan" class="btn btn-primary px-5 py-3 rounded-pill shadow-sm" disabled>
      <span class="d-flex align-items-center gap-2">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>
        </svg>
        Simpan Setoran
      </span>
    </button>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer" style="z-index: 10000;"></div>

  <!-- Modal Scanner -->
  <div class="modal fade" id="modalScanQR" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius: 20px; overflow: hidden; border: none;">
        <div class="modal-header border-0 bg-light">
          <h5 class="modal-title fw-bold" style="color: var(--primary);">📷 Scanner QR Santri</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center p-0">
          <div id="reader" style="width:100%; border: none;"></div>
          <div id="scanStatus" class="p-3 text-muted fw-medium bg-light">Arahkan kamera ke QR Code ID Card...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ==========================================
    // KONFIGURASI BACKEND
    // ==========================================
    const scriptURL = "https://script.google.com/macros/s/AKfycbzFVc8hVloVet18pgc1uSVNZ95TqGYYfonrg3-QcHGC6okKhdBuZK-aswLoLyds7ik/exec";

    // ==========================================
    // OFFLINE / ONLINE DETECTION
    // ==========================================
    window.addEventListener('online', () => {
      document.getElementById('offlineBanner').style.display = 'none';
      showToast("Koneksi internet kembali pulih.", "success");
    });
    window.addEventListener('offline', () => {
      document.getElementById('offlineBanner').style.display = 'block';
    });




    // ==========================================
    // STATE MANAGEMENT
    // ==========================================
    const pelajaranSelect = document.getElementById("pelajaran");
    const tabel = document.getElementById("tabelMateri");
    const tbody = tabel.querySelector("tbody");
    const jenisSelect = document.getElementById("jenis");
    const stambukInput = document.getElementById("stambuk");
    let progressSantri = [];
    let pelajaranData = {};

    function isArabic(text) { return /[\u0600-\u06FF\u0750-\u077F]/.test(text); }

    function isiDariURL() {
      const params = new URLSearchParams(window.location.search);
      if (params.has("stambuk")) document.getElementById("stambuk").value = params.get("stambuk");
      if (params.has("nama")) document.getElementById("nama").value = decodeURIComponent(params.get("nama"));
      if (params.has("kelas")) document.getElementById("kelas").value = params.get("kelas");
      if (params.has("daerah")) document.getElementById("daerah").value = params.get("daerah");
    }
    isiDariURL();

    // ==========================================
    // RENDER MATERI & UI UPDATES
    // ==========================================
    function renderMateri(pelajaranKey) {
      tbody.innerHTML = "";
      const card = document.getElementById("materiCard");

      if (!pelajaranKey || !pelajaranData[pelajaranKey]) {
        card.style.display = "none";
        updateSaveButtonState();
        return;
      }

      const selectedJenis = jenisSelect.value;
      const stambuk = stambukInput.value.trim();

      card.style.display = "block";
      let no = 1;

      pelajaranData[pelajaranKey].forEach((m) => {
        const rtlClass = isArabic(m.judul) ? "rtl" : "ltr";
        if (m.type === "Judul") {
          tbody.insertAdjacentHTML("beforeend", `
          <tr class="table-secondary ${rtlClass}">
            <td colspan="3" class="fw-bold">${m.judul}</td>
          </tr>`);
        } else {
          const sudah = !!progressSantri.find(p =>
            (String(p.pelajaran) === String(pelajaranKey)) &&
            (String(p.judul) === String(m.id) || String(p.judul) === String(m.judul)) &&
            (String(p.jenis) === String(selectedJenis))
          );

          if (sudah) {
            tbody.insertAdjacentHTML("beforeend", `
            <tr class="reported ${rtlClass}">
              <td>${no++}</td>
              <td class="text-decoration-line-through">${m.judul}</td>
              <td class="text-center">✔</td>
            </tr>`);
          } else {
            tbody.insertAdjacentHTML("beforeend", `
            <tr class="${rtlClass}">
              <td>${no++}</td>
              <td class="fw-medium">${m.judul}</td>
              <td class="text-center">
                <input type="checkbox" class="form-check-input m-0 shadow-sm" value="${m.id}" data-judul="${encodeURIComponent(m.judul)}" data-pelajaran="${encodeURIComponent(pelajaranKey)}">
              </td>
            </tr>`);
          }
        }
      });
      updateSaveButtonState();
    }

    // ==========================================
    // PENGAMBILAN DATA (FETCH)
    // ==========================================
    async function loadPelajaran() {
      try {
        if (!navigator.onLine) throw new Error("Offline");
        const res = await fetch(scriptURL, { method: "POST", body: JSON.stringify({ action: "getPelajaran" }) });
        const data = await res.json();
        pelajaranData = data || {};

        pelajaranSelect.innerHTML = `<option value="">-- Pilih Mata Pelajaran --</option>`;
        Object.keys(pelajaranData).forEach(p => {
          pelajaranSelect.innerHTML += `<option value="${p}">${p}</option>`;
        });
      } catch (err) {
        if (navigator.onLine) showToast("Gagal memuat pelajaran. Refresh halaman.", "danger");
      }
    }

    loadPelajaran();

    pelajaranSelect.addEventListener("change", () => renderMateri(pelajaranSelect.value));
    jenisSelect.addEventListener("change", () => {
      renderMateri(pelajaranSelect.value);
      validateCheckedAgainstProgress();
    });

    tbody.addEventListener("change", (e) => {
      if (e.target.matches('input[type="checkbox"]')) {
        updateSaveButtonState();
      }
    });

    function updateSaveButtonState() {
      const checked = tbody.querySelectorAll("input[type='checkbox']:checked");
      const btn = document.getElementById("btnSimpan");
      const status = document.getElementById("statusSelection");

      if (checked.length > 0) {
        btn.disabled = false;
        status.innerHTML = `<span class="text-primary fw-bold">${checked.length} materi</span> siap disimpan`;
      } else {
        btn.disabled = true;
        status.innerHTML = "Belum ada materi dipilih";
      }
    }

    // ==========================================
    // TOAST NOTIFICATIONS
    // ==========================================
    function showToast(message, type = "primary", delay = 4000) {
      const id = "t" + Date.now();
      const icon = type === "success" ? "✅" : type === "danger" ? "❌" : type === "warning" ? "⚠️" : "ℹ️";
      const bgClass = type === "warning" ? "text-dark bg-warning" : `text-white bg-${type}`;

      const toastHtml = `
      <div id="${id}" class="toast align-items-center border-0 ${bgClass} shadow-lg" role="alert" aria-live="assertive" aria-atomic="true" style="border-radius: 12px;">
        <div class="d-flex px-2 py-1">
          <div class="toast-body fw-medium fs-6 d-flex align-items-center gap-2">
            <span>${icon}</span> ${message}
          </div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
      </div>`;

      const container = document.getElementById("toastContainer");
      container.insertAdjacentHTML("beforeend", toastHtml);
      const toastEl = document.getElementById(id);
      const toast = new bootstrap.Toast(toastEl, { delay });
      toast.show();
      toastEl.addEventListener("hidden.bs.toast", () => toastEl.remove());
    }

    // ==========================================
    // PENGIRIMAN DATA (SIMPAN)
    // ==========================================
    document.getElementById("btnSimpan").addEventListener("click", async () => {
      if (!navigator.onLine) {
        showToast("Gagal menyimpan: Anda sedang offline!", "danger");
        return;
      }

      const ustadz = document.getElementById("pembimbing").value.trim();
      const jenis = document.getElementById("jenis").value.trim();

      if (!ustadz) { showToast("Pilih Ustadz Pembimbing dahulu.", "warning"); document.getElementById("pembimbing").focus(); return; }
      if (!jenis) { showToast("Pilih Jenis Kegiatan dahulu.", "warning"); document.getElementById("jenis").focus(); return; }

      const checkedBoxes = [...tbody.querySelectorAll("input[type='checkbox']:checked")];
      const judulDipilih = checkedBoxes.map(x => x.value);

      // Sanitasi data dasar
      const dataToSend = {
        stambuk: stambuk.value.replace(/</g, "&lt;").trim(),
        nama: nama.value.replace(/</g, "&lt;").trim(),
        kelas: kelas.value.replace(/</g, "&lt;").trim(),
        daerah: daerah.value.replace(/</g, "&lt;").trim(),
        ustadz: ustadz,
        jenis: jenis,
        pelajaran: pelajaranSelect.value,
        judul: judulDipilih
      };

      if (!dataToSend.stambuk || !dataToSend.pelajaran || dataToSend.judul.length === 0) {
        showToast("Data tidak valid. Periksa kembali form.", "warning");
        return;
      }

      const btn = document.getElementById("btnSimpan");
      btn.disabled = true;
      const originalText = btn.innerHTML;
      btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Menyimpan...`;

      // Fungsi pengiriman dengan Auto-Retry (menangani LockService sibuk di Apps Script)
      const sendDataWithRetry = async (data, maxRetries = 3, currentRetry = 0) => {
        const res = await fetch(scriptURL, {
          method: "POST",
          body: JSON.stringify({ action: "simpanData", data: data })
        });
        const hasil = await res.json();

        if (hasil.retry && currentRetry < maxRetries) {
          showToast(`Server sibuk. Mengulang otomatis (${currentRetry + 1}/${maxRetries})...`, "warning", 2000);
          await new Promise(resolve => setTimeout(resolve, 2500)); // tunggu 2.5 detik
          return sendDataWithRetry(data, maxRetries, currentRetry + 1);
        }

        if (hasil.error && !hasil.retry) throw new Error(hasil.error);
        return hasil;
      };

      try {
        const hasil = await sendDataWithRetry(dataToSend);
        showToast(hasil.message || "Data berhasil disimpan!", "success");

        await muatProgress(dataToSend.stambuk);
        renderMateri(pelajaranSelect.value);

        // Reset jenis belajar saja agar memudahkan santri berikutnya
        document.getElementById("jenis").value = "";

      } catch (err) {
        showToast("Gagal: " + err.message, "danger", 6000);
      } finally {
        btn.innerHTML = originalText;
        updateSaveButtonState();
      }
    });

    // ==========================================
    // MUAT PROGRESS
    // ==========================================
    async function muatProgress(stambukVal) {
      const div = document.getElementById("progress");
      if (!stambukVal) {
        div.innerHTML = "";
        progressSantri = [];
        renderMateri(pelajaranSelect.value);
        return;
      }

      div.innerHTML = `
      <div class="card shadow-sm border-0">
        <div class="card-body text-center text-muted">
          <div class="spinner-border spinner-border-sm text-primary me-2"></div> Memuat riwayat...
        </div>
      </div>`;

      try {
        const res = await fetch(scriptURL, {
          method: "POST", body: JSON.stringify({ action: "getProgress", stambuk: stambukVal })
        });
        const rows = await res.json();

        const dataRows = Array.isArray(rows) ? rows : [];
        dataRows.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
        progressSantri = dataRows;

        if (progressSantri.length === 0) {
          div.innerHTML = `
          <div class="card shadow-sm border-0 bg-light">
            <div class="card-body text-center py-4">
              <span class="fs-1 d-block mb-2">📭</span>
              <h6 class="fw-bold text-muted mb-0">Belum Ada Riwayat Setoran</h6>
              <small class="text-muted">Santri ini belum pernah melakukan setoran.</small>
            </div>
          </div>`;
        } else {
          const listItems = progressSantri.map(r => {
            const tanggalLocal = new Date(r.tanggal || r.date).toLocaleString("id-ID", {
              day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit"
            });
            return `
            <div class="list-group-item d-flex justify-content-between align-items-center">
              <div>
                <div class="fw-bold text-dark">${r.pelajaran || "-"}</div>
                <div class="small text-muted">${r.materi || r.judul || "-"}</div>
              </div>
              <div class="text-end">
                <div class="badge-jenis mb-1 d-inline-block">${r.jenis || "-"}</div>
                <div class="small text-muted" style="font-size: 11px;">${tanggalLocal}</div>
              </div>
            </div>`;
          }).join("");

          div.innerHTML = `
          <div class="d-flex align-items-center gap-2 mb-3 mt-4">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="text-primary"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h6 class="mb-0 fw-bold">Riwayat Setoran Terbaru</h6>
          </div>
          <div class="list-group list-group-flush" style="max-height: 350px; overflow-y: auto; border-radius: 16px; border: 1px solid var(--border-color); background: white;">
            ${listItems}
          </div>`;
        }

        renderMateri(pelajaranSelect.value);

      } catch (err) {
        progressSantri = [];
        div.innerHTML = `<div class="alert alert-danger rounded-4 border-0">Gagal memuat riwayat: ${err.message}</div>`;
        renderMateri(pelajaranSelect.value);
      }
    }

    stambukInput.addEventListener("input", () => muatProgress(stambukInput.value.trim()));

    function validateCheckedAgainstProgress() {
      const checkedBoxes = [...tbody.querySelectorAll("input[type='checkbox']:checked")];
      const pel = pelajaranSelect.value;
      const jen = jenisSelect.value;
      let anyUnchecked = false;

      checkedBoxes.forEach(cb => {
        const judId = cb.value;
        const judText = decodeURIComponent(cb.dataset.judul || "");
        const found = !!progressSantri.find(p =>
          (String(p.pelajaran) === String(pel)) &&
          (String(p.judul) === String(judId) || String(p.judul) === String(judText)) &&
          (String(p.jenis) === String(jen))
        );
        if (found) { cb.checked = false; anyUnchecked = true; }
      });

      if (anyUnchecked) showToast("Materi yang sudah disetor otomatis dibatalkan.", "info");
      updateSaveButtonState();
    }

    // ==========================================
    // INISIALISASI PLUGINS
    // ==========================================
    document.addEventListener("DOMContentLoaded", async () => {
      const pembimbingSelect = $("#pembimbing");
      try {
        const res = await fetch("pembimbing.json");
        const data = await res.json();
        pembimbingSelect.empty().append('<option value="">-- Cari Nama Ustadz --</option>');
        data.forEach(item => {
          pembimbingSelect.append(`<option value="${item.nama}">${item.nama}</option>`);
        });
        pembimbingSelect.select2({
          placeholder: "🔍 Ketik nama ustadz...",
          allowClear: true,
          width: 'resolve',
          theme: "default"
        });
        // Fix select2 search focus in mobile
        $(document).on('select2:open', () => {
          document.querySelector('.select2-search__field').focus();
        });
      } catch (err) {
        pembimbingSelect.html('<option value="">Gagal memuat data ust 😢</option>');
      }

      document.getElementById("searchJudul").addEventListener("keyup", function () {
        const input = this.value.toLowerCase();
        const rows = document.getElementById("tabelMateri").getElementsByTagName("tr");
        for (let i = 1; i < rows.length; i++) {
          const text = rows[i].textContent.toLowerCase();
          rows[i].style.display = text.includes(input) ? "" : "none";
        }
      });
    });

    // ==========================================
    // QR SCANNER
    // ==========================================
    let html5QrCode;
    document.getElementById("modalScanQR").addEventListener("shown.bs.modal", async () => {
      html5QrCode = new Html5Qrcode("reader");
      try {
        await html5QrCode.start(
          { facingMode: "environment" },
          { 
            fps: 15, 
            qrbox: { width: 250, height: 250 } 
          },
          (decodedText) => {
            document.getElementById("scanStatus").innerHTML = "<span class='text-success fw-bold'>✅ QR Berhasil Dipindai!</span>";
            try {
              const rawParams = decodedText.includes("?") ? decodedText.split("?")[1] : decodedText;
              const params = new URLSearchParams(rawParams);

              if (params.has("stambuk")) stambukInput.value = params.get("stambuk").replace(/</g, "&lt;");
              if (params.has("nama")) document.getElementById("nama").value = decodeURIComponent(params.get("nama")).replace(/</g, "&lt;");
              if (params.has("kelas")) document.getElementById("kelas").value = params.get("kelas").replace(/</g, "&lt;");
              if (params.has("daerah")) document.getElementById("daerah").value = params.get("daerah").replace(/</g, "&lt;");

              loadPelajaran().catch(() => { });
              stambukInput.dispatchEvent(new Event('input'));

              // Reset state
              pelajaranSelect.value = "";
              document.getElementById("materiCard").style.display = "none";
              document.getElementById("jenis").value = "";

              setTimeout(() => bootstrap.Modal.getInstance(document.getElementById("modalScanQR")).hide(), 600);
            } catch (e) { console.error(e); }
          },
          () => { }
        );
      } catch (err) {
        document.getElementById("scanStatus").innerHTML = "<span class='text-danger'>❌ Kamera gagal dibuka. Pastikan izin kamera diberikan.</span>";
      }
    });

    document.getElementById("modalScanQR").addEventListener("hidden.bs.modal", async () => {
      if (html5QrCode) {
        await html5QrCode.stop().catch(() => { });
        html5QrCode.clear();
      }
      document.getElementById("scanStatus").innerHTML = "Arahkan kamera ke QR Code ID Card...";
    });

    // PWA Service Worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js")
          .then(reg => console.log("SW Registered"))
          .catch(err => console.log("SW Failed", err));
      });
    }
  </script>
</body>
